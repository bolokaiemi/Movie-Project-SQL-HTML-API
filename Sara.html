
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sara's Movies</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

.navbar {
    padding: 20px;
    background:#009B50;
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.movie {
    background: #1c1c1c;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.movie:hover {
    transform: scale(1.05);
}

.movie img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 8px;
}

.flag {
    width: 30px;
    margin-top: 5px;
}

.note {
    font-size: 12px;
    color: #bbb;
}

.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #222;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    max-width: 700px;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #e50914;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<nav class="navbar">

</nav>
