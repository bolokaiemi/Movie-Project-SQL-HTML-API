<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Movies</title>
    <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="list-movies-title">
    <h1>Masterschool´s Movie App</h1>
</div>

<div class="container">
    <ol class="movie-grid">

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="images/movie1.jpg" alt="Movie">
                <div class="movie-title">The Dark Knight</div>
                <div class="movie-year">2008</div>
            </div>
        </li>

         <li>
            <div class="movie">
                <img class="movie-poster"
                     src="images/movie2.jpg" alt="Movie">
                     <div class="movie-title">Pulp Fiction</div>
                     <div class="movie-year">1994</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="images/movie3.jpg" alt="Movie">
                <div class="movie-title">In The Name Of The Father</div>
                <div class="movie-year">1993</div>
            </div>
        </li>


        <li>
            <div class="movie">
                <img class="movie-poster"
                        src="images/movie4.png" alt="Movie">
                    <div class="movie-title">Titanic</div>
                    <div class="movie-year">1997</div>
            </div>
        </li>



        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="images/movie5.jpg" alt="Movie">
                    <div class="movie-title">Interstellar</div>
                    <div class="movie-year">2014</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="images/movie6.jpg" alt="Movie">
                     <div class="movie-title">Avatar</div>
                     <div class="movie-year">2009</div>
            </div>
        </li>

    </ol>
</div>

</body>
</html>
